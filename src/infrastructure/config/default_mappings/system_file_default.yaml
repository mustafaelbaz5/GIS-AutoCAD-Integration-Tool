# config/column_mappings/system_file_default.yaml
# Mapping for the base/system-file export format, e.g. مسجل_م الأخوة.xlsx
# ("تقرير الحيازات الزراعية المسجلة" — registered agricultural holdings
# report). Parcel-level: one row per land parcel, with its own
# borders/basin/land-number data — this is what makes it suitable as
# the base/system file, since spatial sorting depends on border data
# that only this report format provides. The other report format
# (e.g. م الاخوة.xlsx, "تقرير حيازات الجمعية المعتمدة") has no border
# data at all, which is why it's the external/secondary mapping
# instead (see external_file_default.yaml).
#
# Verified against the real sample file: single sheet
# "AgricultureHoldingLandsReport", two-row header at rows 9-10, data
# starting at row 11.

name: "System File (Default) — Lands Report"
description: "Mapping for مسجل_م الأخوة.xlsx-style exports — fixed schema, two-row header."

sheet_name: "AgricultureHoldingLandsReport"
data_starts_at_row: 11

# The join key column — رقم الحيازة. Extracted directly from this
# column regardless of which semantic field name (if any) also maps
# to it, per Iteration 3's "join key comes from the mapping" rule.
join_key_column: "N"

fields:
  فدان: "A"
  قيراط: "C"
  سهم: "D"
  رقم_الأرض: "E"
  الحد_البحرى: "G"
  الحد_الغربى: "H"
  الحد_القبلى: "I"
  الحد_الشرقى: "J"
  رقم_الصفحة_بالسجل: "L"
  رقم_الحيازة: "N"
  اسم_الحائز: "O"
  كود_الحوض: "Q"
  اسم_الحوض: "S"
  الجمعيه: "T"
  الأداره: "U"
  المديريه: "V"
