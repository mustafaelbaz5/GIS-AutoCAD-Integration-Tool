# config/column_mappings/system_file_default.yaml
# Mapping for the fixed-schema system file, e.g. الاخوه.xlsx.
# Verified against the real sample file: single sheet
# "AgricultureHoldingLandsReport", two-row header at rows 9-10, data
# starting at row 11.
#
# As of Iteration 3, this is just another mapping — no code path is
# hard-coded to "the system file" anymore. It's the default assigned
# to slot 1 in the "System + External" merge mode, but structurally
# it's read through the exact same MappedFileReader as any other file.

name: "System File (Default)"
description: "Mapping for الاخوه.xlsx — fixed schema, two-row header."

sheet_name: "AgricultureHoldingLandsReport"
data_starts_at_row: 11

# The join key column — رقم الحيازة. Extracted directly from this
# column regardless of which semantic field name (if any) also maps
# to it, per Iteration 3's "join key comes from the mapping" rule.
join_key_column: "N"

fields:
  فدان: "A"
  قيراط: "C"
  سهم: "D"
  رقم_الأرض: "E"
  الحد_البحرى: "G"
  الحد_الغربى: "H"
  الحد_القبلى: "I"
  الحد_الشرقى: "J"
  رقم_الصفحة_بالسجل: "L"
  رقم_الحيازة: "N"
  اسم_الحائز: "O"
  كود_الحوض: "Q"
  اسم_الحوض: "S"
  الجمعيه: "T"
  الأداره: "U"
  المديريه: "V"
